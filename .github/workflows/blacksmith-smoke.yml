name: Blacksmith Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Blacksmith Smoke
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Runner identity
        run: |
          set -euo pipefail
          echo "repo=${GITHUB_REPOSITORY}"
          echo "runner=${RUNNER_NAME:-unknown}"
          echo "runner_os=${RUNNER_OS:-unknown}"
          echo "runner_arch=${RUNNER_ARCH:-unknown}"
          uname -a
          git --version
          python3 --version

      - name: Repository smoke
        run: |
          set -euo pipefail
          test -f README.md
          find . -maxdepth 2 -type f | sort | sed -n '1,40p'
